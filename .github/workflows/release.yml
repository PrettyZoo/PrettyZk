name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    strategy:
      matrix:
        include:
          - arch: x64
            runner: macos-13
            rust_target: x86_64-apple-darwin
          - arch: aarch64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4 with: { distribution: 'temurin', java-version: '21' }
      - uses: actions/setup-node@v4 with: { node-version: '22' }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install -g @tauri-apps/cli@latest
      - run: echo "APPLE_SIGNING_ENABLED=false" >> $GITHUB_ENV

      - uses: actions/cache@v4 with:
          path: ~/.gradle/caches ~/.gradle/wrapper ~/.cargo/registry ~/.cargo/git src-tauri/target
          key: macos-${{ hashFiles('**/*.gradle*', 'src-tauri/Cargo.lock') }}

      - run: cd webapp && npm install && npm run build
      - run: ./gradlew :app:installDist --no-daemon -x test

      - name: JRE
        run: |
          jlink --module-path "$JAVA_HOME/jmods" \
            --add-modules java.base,java.desktop,java.logging,java.naming,java.management,java.instrument,java.security.jgss,java.net.http,java.scripting,java.xml,jdk.unsupported \
            --no-header-files --no-man-pages --output build/jlink-runtime
          rm -rf build/jlink-runtime/legal
          echo "JRE size: $(du -sh build/jlink-runtime | cut -f1)"

      - name: Build binary
        run: |
          rustup target add ${{ matrix.rust_target }}
          cd src-tauri && cargo build --release --target ${{ matrix.rust_target }}
          cp target/${{ matrix.rust_target }}/release/prettyzoo target/release/prettyzoo

      - name: Inject JRE & create DMG
        run: |
          APP="src-tauri/target/release/bundle/macos/PrettyZk.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp src-tauri/target/release/prettyzoo "$APP/Contents/MacOS/"
          mkdir -p "$APP/Contents/Resources/runtime" "$APP/Contents/Resources/app/lib"
          cp -R build/jlink-runtime/* "$APP/Contents/Resources/runtime/"
          cp app/build/install/app/lib/*.jar "$APP/Contents/Resources/app/lib/"
          cp src-tauri/icons/icon.icns "$APP/Contents/Resources/"
          cat > "$APP/Contents/Info.plist" << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict>
<key>CFBundleExecutable</key><string>prettyzoo</string>
<key>CFBundleIdentifier</key><string>cc.cc1234.prettyzk</string>
<key>CFBundleName</key><string>PrettyZk</string>
<key>CFBundleVersion</key><string>3.0.0</string>
<key>CFBundleShortVersionString</key><string>3.0.0</string>
<key>CFBundleIconFile</key><string>icon.icns</string>
<key>CFBundlePackageType</key><string>APPL</string>
<key>LSMinimumSystemVersion</key><string>12.0</string>
<key>NSHighResolutionCapable</key><true/>
</dict></plist>
EOF
          echo "App size: $(du -sh $APP | cut -f1)"
          DMG_DIR="/tmp/prettyzk-dmg"
          mkdir -p "$DMG_DIR" && cp -R "$APP" "$DMG_DIR/PrettyZk.app" && ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "PrettyZk" -srcfolder "$DMG_DIR" -ov -format UDZO \
            "$GITHUB_WORKSPACE/PrettyZk_3.0.0_${{ matrix.arch }}.dmg" 2>/dev/null
          echo "DMG size: $(du -sh $GITHUB_WORKSPACE/PrettyZk_3.0.0_${{ matrix.arch }}.dmg | cut -f1)"

      - uses: softprops/action-gh-release@v2
        with:
          files: PrettyZk_3.0.0_${{ matrix.arch }}.dmg
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4 with: { distribution: 'temurin', java-version: '21' }
      - uses: actions/setup-node@v4 with: { node-version: '22' }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install -g @tauri-apps/cli@latest
      - run: choco install wixtoolset -y --no-progress

      - uses: actions/cache@v4 with:
          path: ~/.gradle/caches ~/.gradle/wrapper ~/.cargo/registry ~/.cargo/git src-tauri/target
          key: win-${{ hashFiles('**/*.gradle*', 'src-tauri/Cargo.lock') }}

      - run: cd webapp && npm install && npm run build
      - run: ./gradlew :app:installDist --no-daemon -x test

      - name: JRE
        run: |
          "$JAVA_HOME/bin/jlink" --module-path "$JAVA_HOME/jmods" \
            --add-modules java.base,java.desktop,java.logging,java.naming,java.management,java.instrument,java.security.jgss,java.net.http,java.scripting,java.xml,jdk.unsupported \
            --no-header-files --no-man-pages --output build/jlink-runtime
          rm -rf build/jlink-runtime/legal

      - name: Tauri build
        run: cd src-tauri && npx tauri build

      - name: Create JRE zip for auto-download
        run: |
          mkdir -p dist/jre/runtime dist/jre/app/lib
          cp -R build/jlink-runtime/* dist/jre/runtime/
          cp app/build/install/app/lib/*.jar dist/jre/app/lib/
          cd dist && powershell -Command "Compress-Archive -Path jre -DestinationPath jre.zip -Force"
          echo "JRE zip: $(ls -lh dist/jre.zip)"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jre.zip
            src-tauri/target/release/bundle/msi/*.msi
          draft: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
