name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Triggering builds for ${{ github.ref_name }}"

  mac-x64:
    uses: ./.github/workflows/build-mac-x64.yml
    secrets: inherit

  mac-arm64:
    uses: ./.github/workflows/build-mac-arm64.yml
    secrets: inherit

  win-x64:
    uses: ./.github/workflows/build-win-x64.yml
    secrets: inherit
