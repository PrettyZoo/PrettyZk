name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            ext: dmg
          - os: windows-latest
            ext: msi

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches ~/.gradle/wrapper
            ~/.cargo/registry ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'src-tauri/Cargo.lock', 'webapp/package-lock.json') }}

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: WiX (Windows)
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y --no-progress

      - name: Disable macOS signing
        if: runner.os == 'macOS'
        run: echo "APPLE_SIGNING_ENABLED=false" >> $GITHUB_ENV

      - name: Frontend
        run: cd webapp && npm install && npm run build

      - name: Backend
        run: ./gradlew :app:installDist --no-daemon -x test

      - name: JRE
        run: |
          jlink --module-path "$JAVA_HOME/jmods" \
            --add-modules java.base,java.desktop,java.logging,java.naming,java.management,java.instrument,java.security.jgss,java.net.http,java.scripting,java.xml,jdk.unsupported \
            --no-header-files --no-man-pages --output build/jlink-runtime
          rm -rf build/jlink-runtime/legal

      - name: Stage resources for Tauri
        run: |
          rm -rf src-tauri/resources
          mkdir -p src-tauri/resources/runtime src-tauri/resources/app/lib
          cp -R build/jlink-runtime/* src-tauri/resources/runtime/
          cp app/build/install/app/lib/*.jar src-tauri/resources/app/lib/

      - name: Force clean Tauri app cache
        run: cd src-tauri && cargo clean -p prettyzoo 2>/dev/null; echo "done"

      - name: Tauri build
        run: cd src-tauri && npx tauri build

      - name: Custom DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="src-tauri/target/release/bundle/macos/PrettyZk.app"
          # JRE already bundled by Tauri via resources config
          DMG_DIR="/tmp/prettyzk-dmg"
          mkdir -p "$DMG_DIR" && cp -R "$APP" "$DMG_DIR/PrettyZk.app" && ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "PrettyZk" -srcfolder "$DMG_DIR" -ov -format UDZO $GITHUB_WORKSPACE/PrettyZk_3.0.0.dmg

      - name: Create combined Windows installer
        if: runner.os == 'Windows'
        run: |
          choco install nsis -y --no-progress
          mkdir -p dist/nsis
          MSI=$(ls src-tauri/target/release/bundle/msi/*.msi | head -1)
          cp "$MSI" dist/nsis/
          mkdir -p dist/nsis/jre/runtime dist/nsis/jre/app/lib
          cp -R build/jlink-runtime/* dist/nsis/jre/runtime/
          cp app/build/install/app/lib/*.jar dist/nsis/jre/app/lib/
          cat > dist/nsis/installer.nsi << 'NSISEOF'
!define PRODUCT_NAME "PrettyZk"
!define PRODUCT_VERSION "3.0.0"
SetCompressor lzma
Name "${PRODUCT_NAME} ${PRODUCT_VERSION}"
OutFile "PrettyZk-Setup.exe"
RequestExecutionLevel admin

Section "Install"
  SetOutPath "$TEMP\prettyzk-install"
  File "*.msi"
  File /r "jre"
  ExecWait 'msiexec /i "$TEMP\prettyzk-install\PrettyZk_3.0.0.msi" /qn'
  CreateDirectory "$PROGRAMFILES64\PrettyZk\resources\runtime"
  CreateDirectory "$PROGRAMFILES64\PrettyZk\resources\app\lib"
  CopyFiles /SILENT "$TEMP\prettyzk-install\jre\runtime\*" "$PROGRAMFILES64\PrettyZk\resources\runtime"
  CopyFiles /SILENT "$TEMP\prettyzk-install\jre\app\lib\*" "$PROGRAMFILES64\PrettyZk\resources\app\lib"
  RMDir /r "$TEMP\prettyzk-install"
SectionEnd
NSISEOF
          cd dist/nsis && makensis installer.nsi && cp PrettyZk-Setup.exe $GITHUB_WORKSPACE/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            PrettyZk_3.0.0.dmg
            PrettyZk-Setup.exe
            src-tauri/target/release/bundle/**/*.${{ matrix.ext }}
          draft: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
