name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4 with: { distribution: 'temurin', java-version: '21' }
      - uses: actions/setup-node@v4 with: { node-version: '20' }
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4 with:
          path: |
            ~/.gradle/caches ~/.gradle/wrapper
            ~/.cargo/registry ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'src-tauri/Cargo.lock') }}

      - run: cd webapp && npm install && npm run build
      - run: ./gradlew :app:installDist -x test

      - name: Build JRE
        run: |
          jlink --module-path "$JAVA_HOME/jmods" \
            --add-modules java.base,java.desktop,java.logging,java.naming,java.management,java.instrument,java.security.jgss,java.net.http,java.scripting,java.xml,jdk.unsupported \
            --strip-debug --no-header-files --no-man-pages --output build/jlink-runtime
          rm -rf build/jlink-runtime/legal

      - name: Build Tauri
        run: |
          cd src-tauri && cargo build --release
          APP="target/release/bundle/macos/PrettyZk.app"
          mkdir -p "$APP/Contents/Resources/runtime" "$APP/Contents/Resources/app/lib"
          cp -R ../build/jlink-runtime/* "$APP/Contents/Resources/runtime/"
          cp ../app/build/install/app/lib/*.jar "$APP/Contents/Resources/app/lib/"
          DMG_DIR="/tmp/prettyzk-dmg"
          mkdir -p "$DMG_DIR" && cp -R "$APP" "$DMG_DIR/PrettyZk.app" && ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "PrettyZk" -srcfolder "$DMG_DIR" -ov -format UDZO ../PrettyZk_3.0.0.dmg

      - uses: softprops/action-gh-release@v2
        with:
          files: PrettyZk_3.0.0.dmg
          draft: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4 with: { distribution: 'temurin', java-version: '21' }
      - uses: actions/setup-node@v4 with: { node-version: '20' }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install -g @tauri-apps/cli

      - name: Cache
        uses: actions/cache@v4 with:
          path: |
            ~/.gradle/caches ~/.gradle/wrapper
            ~/.cargo/registry ~/.cargo/git
            src-tauri\target
          key: ${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'src-tauri/Cargo.lock') }}

      - run: cd webapp && npm install && npm run build
      - run: ./gradlew :app:installDist -x test

      - name: Build Tauri
        run: cd src-tauri && cargo tauri build

      - uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/msi/*
          draft: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
