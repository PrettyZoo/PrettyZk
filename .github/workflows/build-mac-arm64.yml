name: macOS Apple Silicon (ARM64)

on:
  workflow_call:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - run: echo "APPLE_SIGNING_ENABLED=false" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            webapp/node_modules
            ~/.npm
          key: mac-arm64-${{ hashFiles('**/*.gradle*', 'src-tauri/Cargo.lock', 'src-tauri/tauri.conf.json') }}

      - run: cd webapp && npm install && npm run build
      - run: ./gradlew :app:installDist --no-daemon -x test

      - name: JRE
        run: |
          jlink --module-path "$JAVA_HOME/jmods" \
            --add-modules java.base,java.desktop,java.logging,java.naming,java.management,java.instrument,java.security.jgss,java.net.http,java.scripting,java.xml,jdk.unsupported \
            --strip-debug --no-header-files --no-man-pages \
            --output build/jlink-runtime
          rm -rf build/jlink-runtime/legal

      - name: Build
        run: cd src-tauri && cargo build --release --target aarch64-apple-darwin && cp target/aarch64-apple-darwin/release/prettyzoo target/release/prettyzoo

      - name: DMG
        run: |
          APP="src-tauri/target/release/bundle/macos/PrettyZk.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources/runtime" "$APP/Contents/Resources/app/lib"
          cp src-tauri/target/release/prettyzoo "$APP/Contents/MacOS/"
          cp -R build/jlink-runtime/* "$APP/Contents/Resources/runtime/"
          cp app/build/install/app/lib/*.jar "$APP/Contents/Resources/app/lib/"
          cp src-tauri/icons/icon.icns "$APP/Contents/Resources/"
          cp src-tauri/Info.plist "$APP/Contents/"
          DMG_DIR="/tmp/prettyzk-dmg"
          mkdir -p "$DMG_DIR" && cp -R "$APP" "$DMG_DIR/PrettyZk.app" && ln -s /Applications "$DMG_DIR/Applications"
          VER="${GITHUB_REF_NAME#v}"
          hdiutil create -volname "PrettyZk" -srcfolder "$DMG_DIR" -ov -format UDZO "$GITHUB_WORKSPACE/PrettyZk_${VER}_aarch64.dmg"

      - uses: softprops/action-gh-release@v2
        with:
          files: PrettyZk_*.dmg
          tag_name: ${{ github.ref_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
