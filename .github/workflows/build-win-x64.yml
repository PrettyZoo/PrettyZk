name: Windows x86_64

on:
  workflow_call:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - run: choco install nsis -y --no-progress

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            webapp/node_modules
            ~/.npm
          key: win-x64-${{ hashFiles('**/*.gradle*', 'src-tauri/Cargo.lock', 'src-tauri/tauri.conf.json') }}

      - run: cd webapp && npm install && npm run build
      - run: ./gradlew :app:installDist --no-daemon -x test

      - name: JRE
        run: |
          "$JAVA_HOME/bin/jlink" --module-path "$JAVA_HOME/jmods" \
            --add-modules java.base,java.desktop,java.logging,java.naming,java.management,java.instrument,java.security.jgss,java.net.http,java.scripting,java.xml,jdk.unsupported \
            --no-header-files --no-man-pages --output build/jlink-runtime
          rm -rf build/jlink-runtime/legal

      - name: Build Tauri binary
        run: cd src-tauri && cargo build --release

      - name: Download WebView2 bootstrapper
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist/stage
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/?linkid=2124703' -OutFile 'dist/stage/MicrosoftEdgeWebview2Setup.exe' -UseBasicParsing

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Tauri binary and WebView2 loader
          Copy-Item src-tauri/target/release/prettyzoo.exe dist/stage/
          Copy-Item src-tauri/target/release/WebView2Loader.dll dist/stage/ -ErrorAction SilentlyContinue
          # JRE
          Copy-Item build/jlink-runtime dist/stage/runtime -Recurse -Force
          # Java application JARs
          New-Item -ItemType Directory -Force -Path dist/stage/app/lib
          Copy-Item app/build/install/app/lib/*.jar dist/stage/app/lib/
          # NSIS script
          Copy-Item scripts/installer.nsi dist/
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V1 "-DVERSION=$ver" dist/installer.nsi
          if ($LASTEXITCODE -ne 0) { Write-Error "NSIS compilation failed"; exit 1 }
          Copy-Item dist/PrettyZk-Setup.exe $env:GITHUB_WORKSPACE/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            PrettyZk-Setup.exe
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
