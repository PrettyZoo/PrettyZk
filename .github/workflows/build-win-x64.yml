name: Windows x86_64

on:
  workflow_call:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install -g @tauri-apps/cli@latest
      - run: choco install wixtoolset nsis -y --no-progress

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: win-x64-${{ hashFiles('**/*.gradle*', 'src-tauri/Cargo.lock', 'src-tauri/tauri.conf.json') }}

      - run: cd webapp && npm install && npm run build

      - name: Backend
        run: ./gradlew :app:installDist --no-daemon -x test

      - name: JRE
        run: |
          "$JAVA_HOME/bin/jlink" --module-path "$JAVA_HOME/jmods" \
            --add-modules java.base,java.desktop,java.logging,java.naming,java.management,java.instrument,java.security.jgss,java.net.http,java.scripting,java.xml,jdk.unsupported \
            --no-header-files --no-man-pages --output build/jlink-runtime
          rm -rf build/jlink-runtime/legal

      - name: Tauri build (no resources config -> no build.rs issue)
        run: cd src-tauri && npx tauri build

      - name: Create combined setup
        shell: pwsh
        run: |
          # Create NSIS installer combining MSI + JRE + backend jars
          $msi = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path dist/src
          Copy-Item $msi.FullName dist/src/app.msi
          Copy-Item build/jlink-runtime dist/src/runtime -Recurse -Force
          mkdir -p dist/src/app/lib
          Copy-Item app/build/install/app/lib/*.jar dist/src/app/lib/ -Force

          @"
!define PRODUCT_NAME "PrettyZk"
!define PRODUCT_VERSION "3.0.0"
SetCompressor lzma
Name "${PRODUCT_NAME} ${PRODUCT_VERSION}"
OutFile "PrettyZk-Setup.exe"
RequestExecutionLevel admin

Section "Install"
  SetOutPath "`$INSTDIR"
  File /r "src\*.*"
  ExecWait 'msiexec /i "`$INSTDIR\app.msi" /qn'
SectionEnd
"@ | Out-File -FilePath dist/installer.nsi -Encoding ASCII

          & "C:\Program Files (x86)\NSIS\makensis.exe" dist/installer.nsi
          Copy-Item dist/PrettyZk-Setup.exe $env:GITHUB_WORKSPACE/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            PrettyZk-Setup.exe
            src-tauri/target/release/bundle/msi/*.msi
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
